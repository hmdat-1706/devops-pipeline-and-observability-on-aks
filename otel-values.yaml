image:
  repository: otel/opentelemetry-collector-contrib
mode: daemonset
config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
    zipkin:
      endpoint: 0.0.0.0:9411
  exporters:
    otlp:
      endpoint: tempo:3200
      tls:
        insecure: true
  service:
    pipelines:
      traces:
        receivers: [otlp, zipkin]
        exporters: [otlp]
