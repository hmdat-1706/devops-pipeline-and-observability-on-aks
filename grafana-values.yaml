datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
    - name: Loki
      type: loki
      url: http://loki:3100
      access: proxy
    - name: Tempo
      type: tempo
      url: http://tempo:3100
      access: proxy
    - name: Mimir
      type: prometheus
      url: http://mimir-gateway:80
      access: proxy
      isDefault: true
persistence:
  enabled: true
  type: pvc
  size: 2Gi
